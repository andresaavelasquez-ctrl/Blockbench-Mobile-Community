name: Compilar APK Android

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"

permissions:
  contents: read

concurrency:
  group: android-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Configurar Android SDK
        uses: android-actions/setup-android@v4
        with:
          packages: "platform-tools platforms;android-36 build-tools;36.0.0"

      - name: Verificar herramientas Android
        shell: bash
        run: |
          echo "ANDROID_SDK_ROOT=${ANDROID_SDK_ROOT}"
          command -v sdkmanager
          sdkmanager --version
          test -d "${ANDROID_SDK_ROOT}/platforms/android-36"
          test -d "${ANDROID_SDK_ROOT}/build-tools/36.0.0"

      - name: Instalar dependencias del contenedor Android
        run: npm install

      - name: Descargar Blockbench fijado
        run: npm run upstream:fetch

      - name: Instalar dependencias de Blockbench
        run: npm run upstream:install

      - name: Compilar Blockbench Web con adaptación móvil
        run: npm run upstream:build

      - name: Preparar interfaz móvil
        run: npm run web:prepare

      - name: Crear proyecto Android
        run: npm run android:ensure

      - name: Sincronizar Capacitor
        run: npx cap sync android

      - name: Aplicar ajustes Android
        run: npm run android:patch

      - name: Detectar firma estable
        id: signing
        shell: bash
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [[ -n "${KEYSTORE_BASE64}" ]]; then
            echo "${KEYSTORE_BASE64}" | base64 --decode > "${RUNNER_TEMP}/blockbench-mobile-release.p12"
            echo "enabled=true" >> "${GITHUB_OUTPUT}"
          else
            echo "enabled=false" >> "${GITHUB_OUTPUT}"
            echo "No hay secretos de firma: se generará APK debug."
          fi

      - name: Compilar APK release sin firmar
        if: steps.signing.outputs.enabled == 'true'
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --stacktrace --no-daemon

      - name: Compilar APK debug
        if: steps.signing.outputs.enabled != 'true'
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace --no-daemon

      - name: Preparar APK firmada estable
        if: steps.signing.outputs.enabled == 'true'
        shell: bash
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          mkdir -p dist
          VERSION=$(node -p "require('./upstream/blockbench/package.json').version")
          UNSIGNED="android/app/build/outputs/apk/release/app-release-unsigned.apk"
          ALIGNED="${RUNNER_TEMP}/blockbench-mobile-aligned.apk"
          OUTPUT="dist/Blockbench-Mobile-${VERSION}-release.apk"
          BUILD_TOOLS="${ANDROID_SDK_ROOT}/build-tools/36.0.0"

          "${BUILD_TOOLS}/zipalign" -p -f 4 "${UNSIGNED}" "${ALIGNED}"
          "${BUILD_TOOLS}/apksigner" sign \
            --ks "${RUNNER_TEMP}/blockbench-mobile-release.p12" \
            --ks-key-alias "${ANDROID_KEY_ALIAS}" \
            --ks-pass env:ANDROID_KEYSTORE_PASSWORD \
            --key-pass env:ANDROID_KEY_PASSWORD \
            --out "${OUTPUT}" \
            "${ALIGNED}"
          "${BUILD_TOOLS}/apksigner" verify --verbose --print-certs "${OUTPUT}"

      - name: Preparar APK debug
        if: steps.signing.outputs.enabled != 'true'
        run: |
          mkdir -p dist
          VERSION=$(node -p "require('./upstream/blockbench/package.json').version")
          cp android/app/build/outputs/apk/debug/app-debug.apk "dist/Blockbench-Mobile-${VERSION}-debug.apk"

      - name: Crear comprobación SHA-256
        run: sha256sum dist/*.apk > dist/SHA256SUMS.txt

      - name: Subir APK
        uses: actions/upload-artifact@v4
        with:
          name: Blockbench-Mobile-APK
          path: |
            dist/*.apk
            dist/SHA256SUMS.txt
          if-no-files-found: error
          retention-days: 30
